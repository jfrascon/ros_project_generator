# To use:
#
#     pre-commit run -a
#
# Or:
#
#     pre-commit install  # (runs every time you commit in git)
#
# To update this file:
#
#     pre-commit autoupdate
#
# See https://github.com/pre-commit/pre-commit

default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  # Standard hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-yaml
        exclude: ^src/\.clang-format$
      - id: check-json
      - id: check-xml
      - id: check-toml
      - id: debug-statements
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
      - id: no-commit-to-branch
        args:
          - --branch=main
          - --branch=master

  # Python hooks
  # Ruff replaces both Black (formatter) and isort (import sorting)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Find the latest version from https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      # Run the linter and automatically fix any safe issues.
      - id: ruff
        args: [--fix, --config, pyproject.toml]
      # Run the formatter.
      - id: ruff-format
        args: [--config, pyproject.toml]

  # TOML hooks
  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
      - id: taplo-lint
        args: [--no-schema]

  # YAML hooks
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.16.0
    hooks:
      - id: pretty-format-yaml
        args: [--autofix, --preserve-quotes]

  # CPP hooks
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.5
    hooks:
      - id: clang-format
        files: \.(cpp|hpp|c|h)$

  # Shell hooks
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: [-w, -s, -i=4]

  # Conventional Commits validation (commit message hook)
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
